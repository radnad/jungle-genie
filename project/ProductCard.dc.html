<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face{font-family:'Wonderia';src:url('assets/fonts/Wonderia.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
:root{--olive:#84994F;--butter:#FFE797;--marigold:#FCB53B;--rose-clay:#B45253;--cream:#FBF7EA;--canvas-alt:#F2ECD9;--olive-deep:#33401C;--ink:#2C3019;--muted:#5A6147;--line:#E7DFC8;--marigold-deep:#E09A24;--r-sm:10px;--r-md:16px;--r-lg:24px;--r-pill:999px;--shadow:0 6px 20px rgba(51,64,28,.10);}
</style>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="image-slot.js"></script>
</helmet>

<div style="font-family:'Fraunces',serif;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;height:100%;transition:transform .2s,box-shadow .2s;" style-hover="transform:translateY(-4px);box-shadow:0 14px 30px rgba(51,64,28,.16);">
  <div style="position:relative;">
    <image-slot id="{{ imageId }}" shape="rect" fit="cover" placeholder="Drop plant photo" style="width:100%;height:240px;display:block;background:var(--canvas-alt);"></image-slot>
    <sc-if value="{{ onSale }}" hint-placeholder-val="{{ false }}">
      <span style="position:absolute;top:14px;left:14px;font-family:'Fraunces';font-weight:600;font-size:12px;background:var(--rose-clay);color:var(--cream);padding:5px 12px;border-radius:var(--r-pill);">Sale</span>
    </sc-if>
    <button onClick="{{ toggleLike }}" aria-label="Add to wishlist" style="position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(251,247,234,.92);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(51,64,28,.12);transition:.15s;" style-hover="background:#fff;transform:scale(1.06);">
      <span>{{ heartIcon }}</span>
    </button>
  </div>
  <div style="padding:18px 18px 20px;display:flex;flex-direction:column;gap:10px;flex:1;">
    <span style="align-self:flex-start;font-family:'Fraunces';font-weight:600;font-size:11px;letter-spacing:.04em;background:rgba(180,82,83,.12);color:var(--rose-clay);padding:5px 11px;border-radius:var(--r-pill);">{{ family }}</span>
    <h3 style="font-family:'Wonderia',serif;font-weight:400;font-size:22px;line-height:1.12;margin:0;color:var(--olive-deep);text-wrap:pretty;">{{ nameText }}</h3>
    <div style="display:flex;align-items:baseline;gap:10px;margin-top:auto;">
      <span style="font-family:'Fraunces';font-weight:600;font-size:21px;color:var(--ink);font-variant-numeric:lining-nums;">{{ price }} EGP</span>
      <sc-if value="{{ onSale }}" hint-placeholder-val="{{ false }}">
        <span style="font-family:'Fraunces';font-size:15px;text-decoration:line-through;color:var(--marigold);font-variant-numeric:lining-nums;">{{ sale }}</span>
      </sc-if>
    </div>
    <button onClick="{{ add }}" style="margin-top:6px;font-family:'Fraunces';font-weight:600;font-size:14px;border:none;background:var(--olive);color:var(--cream);padding:12px 16px;border-radius:var(--r-pill);cursor:pointer;transition:.16s;width:100%;" style-hover="background:var(--marigold);color:var(--olive-deep);">{{ addLabel }}</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:420},&quot;nameText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Monstera Adansonii Variegated&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;family&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Monstera&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;price&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;2,500&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sale&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;imageId&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;prod&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;liked&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onAdd&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { liked: false, added: false, initDone: false };
  renderVals() {
    const liked = this.state.initDone ? this.state.liked : !!this.props.liked;
    const sale = this.props.sale;
    const onSale = sale != null && sale !== '' && sale !== false;
    return {
      imageId: this.props.imageId || 'prod',
      family: this.props.family || 'Plant',
      nameText: this.props.nameText || 'Plant',
      price: this.props.price || '0',
      sale, onSale,
      heartIcon: liked
        ? React.createElement('svg', { width: 20, height: 20, viewBox: '0 0 24 24' },
            React.createElement('path', { d: 'M12 21s-7-5-9.5-9.2C.8 8.9 2.2 5.5 5.4 5.5c1.9 0 3.1 1 3.9 2.1.8-1.1 2-2.1 3.9-2.1 3.2 0 4.6 3.4 2.9 6.3C19 16 12 21 12 21Z', fill: '#B45253' }))
        : React.createElement('svg', { width: 20, height: 20, viewBox: '0 0 24 24', fill: 'none' },
            React.createElement('path', { d: 'M12 20s-6.5-4.6-9-8.6C1.5 9 2.7 6.3 5.5 6.3c1.8 0 2.9 1 3.6 2 .7-1 1.8-2 3.6-2 2.8 0 4 2.7 2.5 5.1C18.5 15.4 12 20 12 20Z', stroke: '#B45253', strokeWidth: 1.6, strokeLinejoin: 'round' })),
      addLabel: this.state.added ? 'Wish granted ✓' : 'Add to cart',
      toggleLike: () => this.setState(s => ({ liked: !(s.initDone ? s.liked : !!this.props.liked), initDone: true })),
      add: () => {
        if (typeof this.props.onAdd === 'function') this.props.onAdd();
        this.setState({ added: true });
        clearTimeout(this._t);
        this._t = setTimeout(() => this.setState({ added: false }), 1400);
      },
    };
  }
}
</script>
</body>
</html>
