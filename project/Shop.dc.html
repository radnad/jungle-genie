<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face{font-family:'Wonderia';src:url('assets/fonts/Wonderia.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
:root{--olive:#84994F;--butter:#FFE797;--marigold:#FCB53B;--rose-clay:#B45253;--cream:#FBF7EA;--canvas-alt:#F2ECD9;--olive-deep:#33401C;--ink:#2C3019;--muted:#5A6147;--line:#E7DFC8;--marigold-deep:#E09A24;--r-sm:10px;--r-md:16px;--r-lg:24px;--r-pill:999px;--shadow:0 6px 20px rgba(51,64,28,.10);}
*{box-sizing:border-box;}
body{margin:0;background:var(--cream);}
input[type=range]{accent-color:#84994F;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="image-slot.js"></script>
</helmet>

<div style="font-family:'Fraunces',serif;color:var(--ink);background:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased;">

  <dc-import name="Nav" cart-count="{{ cart }}" hint-size="100%,72px"></dc-import>

  <!-- page head -->
  <section style="max-width:1280px;margin:0 auto;padding:40px 5vw 8px;">
    <p style="font-family:'Fraunces';font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:var(--marigold-deep);margin:0 0 6px;">All plants</p>
    <h1 style="font-family:'Wonderia',serif;font-weight:400;font-size:clamp(36px,5vw,60px);margin:0;color:var(--olive-deep);">The whole jungle</h1>

    <!-- category chips -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;">
      <sc-for list="{{ chips }}" as="c" hint-placeholder-count="6">
        <button onClick="{{ c.toggle }}" style="font-family:'Fraunces';font-weight:600;font-size:14px;padding:9px 16px;border-radius:var(--r-pill);cursor:pointer;transition:.15s;border:1.5px solid {{ c.border }};background:{{ c.bg }};color:{{ c.fg }};">{{ c.label }}</button>
      </sc-for>
    </div>
  </section>

  <!-- toolbar -->
  <section style="max-width:1280px;margin:0 auto;padding:18px 5vw 0;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:12px;">
      <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ toggleFilters }}" style="font-family:'Fraunces';font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:var(--r-pill);cursor:pointer;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 5h18M6 12h12M10 19h4" stroke="#33401C" stroke-width="1.7" stroke-linecap="round"/></svg>Filters</button>
      </sc-if>
      <span style="color:var(--muted);font-size:14px;font-variant-numeric:lining-nums;">{{ count }} plants</span>
    </div>
    <label style="display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;">Sort
      <select onChange="{{ setSort }}" value="{{ sort }}" style="font-family:'Fraunces';font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:var(--r-pill);padding:8px 14px;cursor:pointer;">
        <option value="featured">Featured</option>
        <option value="price-asc">Price: low to high</option>
        <option value="price-desc">Price: high to low</option>
        <option value="name">Name A–Z</option>
      </select>
    </label>
  </section>

  <!-- body -->
  <section style="max-width:1280px;margin:0 auto;padding:24px 5vw 64px;display:flex;gap:32px;align-items:flex-start;">

    <!-- filter sidebar -->
    <sc-if value="{{ showFilters }}" hint-placeholder-val="{{ true }}">
      <aside style="flex:0 0 236px;width:236px;position:sticky;top:88px;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <span style="font-family:'Wonderia',serif;font-size:22px;color:var(--olive-deep);">Filters</span>
          <button onClick="{{ clearAll }}" style="font-family:'Fraunces';font-size:13px;background:none;border:none;color:var(--marigold-deep);cursor:pointer;text-decoration:underline;">Clear</button>
        </div>

        <p style="font-family:'Fraunces';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;color:var(--muted);margin:18px 0 10px;">Plant family</p>
        <sc-for list="{{ familyRows }}" as="f" hint-placeholder-count="6">
          <label onClick="{{ f.toggle }}" style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;font-size:14px;color:var(--ink);">
            <span style="width:18px;height:18px;border-radius:5px;border:1.5px solid {{ f.border }};background:{{ f.box }};display:flex;align-items:center;justify-content:center;flex-shrink:0;">{{ f.tick }}</span>
            <span style="flex:1;">{{ f.name }}</span>
            <span style="color:var(--muted);font-size:12px;font-variant-numeric:lining-nums;">{{ f.count }}</span>
          </label>
        </sc-for>

        <p style="font-family:'Fraunces';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;color:var(--muted);margin:20px 0 10px;">Light</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <sc-for list="{{ lightRows }}" as="l" hint-placeholder-count="3">
            <button onClick="{{ l.toggle }}" style="font-family:'Fraunces';font-size:13px;padding:7px 13px;border-radius:var(--r-pill);cursor:pointer;border:1.5px solid {{ l.border }};background:{{ l.bg }};color:{{ l.fg }};">{{ l.name }}</button>
          </sc-for>
        </div>

        <p style="font-family:'Fraunces';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;color:var(--muted);margin:20px 0 10px;">Care level</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <sc-for list="{{ careRows }}" as="c" hint-placeholder-count="3">
            <button onClick="{{ c.toggle }}" style="font-family:'Fraunces';font-size:13px;padding:7px 13px;border-radius:var(--r-pill);cursor:pointer;border:1.5px solid {{ c.border }};background:{{ c.bg }};color:{{ c.fg }};">{{ c.name }}</button>
          </sc-for>
        </div>

        <p style="font-family:'Fraunces';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;color:var(--muted);margin:20px 0 10px;">Size</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <sc-for list="{{ sizeRows }}" as="s" hint-placeholder-count="3">
            <button onClick="{{ s.toggle }}" style="font-family:'Fraunces';font-size:13px;padding:7px 13px;border-radius:var(--r-pill);cursor:pointer;border:1.5px solid {{ s.border }};background:{{ s.bg }};color:{{ s.fg }};">{{ s.name }}</button>
          </sc-for>
        </div>

        <p style="font-family:'Fraunces';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;color:var(--muted);margin:20px 0 8px;">Max price</p>
        <input type="range" min="150" max="3500" step="50" value="{{ maxPrice }}" onChange="{{ setMax }}" onInput="{{ setMax }}" style="width:100%;" />
        <div style="font-size:14px;color:var(--ink);font-variant-numeric:lining-nums;margin-top:4px;">Up to {{ maxPriceStr }} EGP</div>

        <p style="font-family:'Fraunces';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;color:var(--muted);margin:20px 0 10px;">Setting</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <sc-for list="{{ envRows }}" as="e" hint-placeholder-count="2">
            <button onClick="{{ e.toggle }}" style="font-family:'Fraunces';font-size:13px;padding:7px 13px;border-radius:var(--r-pill);cursor:pointer;border:1.5px solid {{ e.border }};background:{{ e.bg }};color:{{ e.fg }};">{{ e.name }}</button>
          </sc-for>
        </div>
      </aside>
    </sc-if>

    <!-- grid -->
    <div style="flex:1;min-width:0;">
      <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px;">
          <sc-for list="{{ visible }}" as="p" hint-placeholder-count="9">
            <dc-import name="ProductCard" hint-size="100%,420px" name-text="{{ p.name }}" family="{{ p.family }}" price="{{ p.priceStr }}" sale="{{ p.sale }}" image-id="{{ p.id }}" on-add="{{ addToCart }}"></dc-import>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
        <div style="text-align:center;padding:80px 20px;color:var(--muted);">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" style="margin-bottom:14px;"><path d="M12 21V9M12 9C12 5 9 3 5 3c0 4 3 6 7 6Zm0 0c0-4 3-6 7-6 0 4-3 6-7 6Z" stroke="#84994F" stroke-width="1.4" stroke-linejoin="round"/></svg>
          <p style="font-family:'Wonderia',serif;font-size:26px;color:var(--olive-deep);margin:0 0 6px;">No wishes match yet</p>
          <p style="margin:0 0 16px;">Try loosening a filter to reveal more leaves.</p>
          <button onClick="{{ clearAll }}" style="font-family:'Fraunces';font-weight:600;font-size:14px;border:1.5px solid var(--marigold);background:transparent;color:var(--marigold-deep);padding:11px 22px;border-radius:var(--r-pill);cursor:pointer;">Clear filters</button>
        </div>
      </sc-if>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,560px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){ super(props); this.state = { cart:0, vw:1280, sort:'featured', filtersOpen:false, fam:[], light:[], care:[], size:[], env:[], maxPrice:3500 }; }
  componentDidMount(){ this._on=()=>this.setState({vw:window.innerWidth}); this._on(); window.addEventListener('resize',this._on); }
  componentWillUnmount(){ window.removeEventListener('resize',this._on); }
  get data(){
    return [
      {name:'Monstera Albo', family:'Monstera', price:3500, id:'sh-1', light:'Bright', care:'Moderate', size:'Large', env:'Indoor'},
      {name:'Philodendron Patriciae', family:'Philodendron', price:2500, id:'sh-2', light:'Bright', care:'Moderate', size:'Medium', env:'Indoor'},
      {name:'Monstera Adansonii Variegated', family:'Monstera', price:2500, id:'sh-3', light:'Bright', care:'Moderate', size:'Medium', env:'Indoor'},
      {name:'Caramel Marble Philodendron', family:'Philodendron', price:3250, id:'sh-4', light:'Bright', care:'Moderate', size:'Medium', env:'Indoor'},
      {name:'Anthurium Clarinervium', family:'Anthurium', price:1250, id:'sh-5', light:'Medium', care:'For pros', size:'Medium', env:'Indoor'},
      {name:'Strawberry Shake Philodendron', family:'Philodendron', price:1600, id:'sh-6', light:'Bright', care:'Moderate', size:'Medium', env:'Indoor'},
      {name:'Rhapis Palm', family:'Palm', price:1750, id:'sh-7', light:'Low', care:'Easy', size:'Large', env:'Indoor'},
      {name:'Variegated Fiddle Leaf', family:'Ficus', price:950, id:'sh-8', light:'Bright', care:'Moderate', size:'Large', env:'Indoor'},
      {name:'Alocasia Frydek Variegated', family:'Alocasia', price:900, id:'sh-9', light:'Bright', care:'For pros', size:'Medium', env:'Indoor'},
      {name:'Persian Shield', family:'Strobilanthes', price:650, id:'sh-10', light:'Bright', care:'Easy', size:'Small', env:'Outdoor'},
      {name:'Alocasia Low Rider', family:'Alocasia', price:700, id:'sh-11', light:'Bright', care:'Moderate', size:'Small', env:'Indoor'},
      {name:'Marble Queen Pothos', family:'Pothos', price:350, id:'sh-12', light:'Low', care:'Easy', size:'Medium', env:'Indoor'},
      {name:'Snake Plant Zeylanica', family:'Sansevieria', price:450, id:'sh-13', light:'Low', care:'Easy', size:'Medium', env:'Indoor'},
      {name:'Ficus Burgundy', family:'Ficus', price:350, id:'sh-14', light:'Bright', care:'Easy', size:'Large', env:'Indoor'},
      {name:'Aloe Vera', family:'Succulent', price:150, id:'sh-15', light:'Bright', care:'Easy', size:'Small', env:'Outdoor'},
      {name:'Bonsai Tree', family:'Bonsai', price:1200, sale:1500, id:'sh-16', light:'Bright', care:'For pros', size:'Small', env:'Outdoor'},
    ];
  }
  fmt(n){ return Number(n).toLocaleString('en-US'); }
  toggleIn(key,val){ this.setState(s=>{ const a=s[key]; const next=a.includes(val)?a.filter(x=>x!==val):[...a,val]; return {[key]:next}; }); }
  renderVals(){
    const s=this.state; const isMobile=s.vw<900;
    let list=this.data.filter(p=>
      (s.fam.length===0||s.fam.includes(p.family)) &&
      (s.light.length===0||s.light.includes(p.light)) &&
      (s.care.length===0||s.care.includes(p.care)) &&
      (s.size.length===0||s.size.includes(p.size)) &&
      (s.env.length===0||s.env.includes(p.env)) &&
      (p.price<=s.maxPrice)
    );
    if(s.sort==='price-asc') list=[...list].sort((a,b)=>a.price-b.price);
    else if(s.sort==='price-desc') list=[...list].sort((a,b)=>b.price-a.price);
    else if(s.sort==='name') list=[...list].sort((a,b)=>a.name.localeCompare(b.name));
    const visible=list.map(p=>({...p, priceStr:this.fmt(p.price), sale:p.sale?this.fmt(p.sale):undefined}));

    const famCounts={}; this.data.forEach(p=>{famCounts[p.family]=(famCounts[p.family]||0)+1;});
    const families=Object.keys(famCounts).sort();
    const mk=(key,val,label)=>{ const on=s[key].includes(val); return {
      name:label||val, count:famCounts[val],
      active:on, tick:on?'✓':'',
      border:on?'#84994F':'#E7DFC8', box:on?'#84994F':'#fff',
      bg:on?'#84994F':'#fff', fg:on?'#FBF7EA':'#5A6147',
      toggle:()=>this.toggleIn(key,val),
    }; };
    const styleTick=r=>({...r, tick:r.active?React.createElement('svg',{width:12,height:12,viewBox:'0 0 24 24'},React.createElement('path',{d:'M5 13l4 4 10-11',stroke:'#FBF7EA',strokeWidth:2.4,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'})):''});

    const chipDefs=[['fam','Monstera'],['fam','Philodendron'],['fam','Alocasia'],['fam','Anthurium'],['fam','Ficus'],['fam','Pothos']];
    const chips=chipDefs.map(([k,v])=>{ const on=s[k].includes(v); return {label:v,toggle:()=>this.toggleIn(k,v),
      border:on?'#84994F':'#E7DFC8', bg:on?'#84994F':'#fff', fg:on?'#FBF7EA':'#5A6147'};});

    return {
      cart:s.cart, addToCart:()=>this.setState(st=>({cart:st.cart+1})),
      isMobile, showFilters: !isMobile || s.filtersOpen,
      toggleFilters:()=>this.setState(st=>({filtersOpen:!st.filtersOpen})),
      sort:s.sort, setSort:(e)=>this.setState({sort:e.target.value}),
      count:list.length, hasResults:list.length>0, noResults:list.length===0,
      visible,
      chips,
      familyRows:families.map(f=>styleTick(mk('fam',f))),
      lightRows:['Bright','Medium','Low'].map(v=>mk('light',v)),
      careRows:['Easy','Moderate','For pros'].map(v=>mk('care',v)),
      sizeRows:['Small','Medium','Large'].map(v=>mk('size',v)),
      envRows:['Indoor','Outdoor'].map(v=>mk('env',v)),
      maxPrice:s.maxPrice, maxPriceStr:this.fmt(s.maxPrice),
      setMax:(e)=>this.setState({maxPrice:Number(e.target.value)}),
      clearAll:()=>this.setState({fam:[],light:[],care:[],size:[],env:[],maxPrice:3500}),
    };
  }
}
</script>
</body>
</html>
