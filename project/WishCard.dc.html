<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face{font-family:'Wonderia';src:url('assets/fonts/Wonderia.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
:root{--olive:#84994F;--butter:#FFE797;--marigold:#FCB53B;--rose-clay:#B45253;--cream:#FBF7EA;--canvas-alt:#F2ECD9;--olive-deep:#33401C;--ink:#2C3019;--muted:#5A6147;--line:#E7DFC8;--marigold-deep:#E09A24;--r-sm:10px;--r-md:16px;--r-lg:24px;--r-pill:999px;--shadow:0 6px 20px rgba(51,64,28,.10);}
@keyframes jg-sparkle{0%,100%{opacity:.4;transform:scale(.75) rotate(-10deg);}50%{opacity:1;transform:scale(1.15) rotate(12deg);}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="image-slot.js"></script>
</helmet>

<div style="position:relative;font-family:'Fraunces',serif;background:linear-gradient(160deg,#FFF6D6 0%,#FBF7EA 60%);border:1px solid rgba(252,181,59,.45);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 8px 26px rgba(224,154,36,.16);display:flex;flex-direction:column;height:100%;transition:transform .2s,box-shadow .2s;" style-hover="transform:translateY(-4px);box-shadow:0 16px 38px rgba(224,154,36,.24);">

  <!-- ribbon -->
  <div style="position:absolute;top:16px;left:0;z-index:2;display:flex;align-items:center;gap:7px;background:var(--marigold);color:var(--olive-deep);font-family:'Fraunces';font-weight:600;font-size:12px;letter-spacing:.06em;padding:7px 15px 7px 14px;border-radius:0 var(--r-pill) var(--r-pill) 0;box-shadow:0 3px 10px rgba(224,154,36,.3);">
    <svg width="13" height="13" viewBox="0 0 24 24" style="animation:jg-sparkle 2.6s ease-in-out infinite;"><path d="M12 2l2.2 6.8L21 11l-6.8 2.2L12 20l-2.2-6.8L3 11l6.8-2.2z" fill="#33401C"/></svg>
    3 WISHES
  </div>

  <!-- sparkle accents -->
  <svg width="16" height="16" viewBox="0 0 24 24" style="position:absolute;top:54px;right:22px;animation:jg-sparkle 3.1s ease-in-out infinite;"><path d="M12 2l2.2 6.8L21 11l-6.8 2.2L12 20l-2.2-6.8L3 11l6.8-2.2z" fill="#FCB53B"/></svg>
  <svg width="10" height="10" viewBox="0 0 24 24" style="position:absolute;top:88px;right:48px;animation:jg-sparkle 2.2s ease-in-out infinite .5s;"><path d="M12 2l2.2 6.8L21 11l-6.8 2.2L12 20l-2.2-6.8L3 11l6.8-2.2z" fill="#E09A24"/></svg>

  <!-- thumbnails -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:6px;padding-top:52px;">
    <image-slot id="{{ id0 }}" shape="rounded" radius="12" placeholder="Plant 1" style="width:100%;height:118px;display:block;background:var(--canvas-alt);"></image-slot>
    <image-slot id="{{ id1 }}" shape="rounded" radius="12" placeholder="Plant 2" style="width:100%;height:118px;display:block;background:var(--canvas-alt);"></image-slot>
    <image-slot id="{{ id2 }}" shape="rounded" radius="12" placeholder="Plant 3" style="width:100%;height:118px;display:block;background:var(--canvas-alt);"></image-slot>
  </div>

  <div style="padding:16px 20px 22px;display:flex;flex-direction:column;gap:9px;flex:1;">
    <div style="display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;">
      <h3 style="font-family:'Wonderia',serif;font-weight:400;font-size:26px;line-height:1;margin:0;color:var(--olive-deep);">{{ titleText }}</h3>
      <span style="font-family:'Fraunces';font-style:italic;font-size:15px;color:var(--marigold-deep);">{{ subtitleText }}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;margin:4px 0 2px;">
      <div style="display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);"><span style="color:var(--olive);font-size:13px;">✦</span>{{ n0 }}</div>
      <div style="display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);"><span style="color:var(--olive);font-size:13px;">✦</span>{{ n1 }}</div>
      <div style="display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);"><span style="color:var(--olive);font-size:13px;">✦</span>{{ n2 }}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:auto;">
      <span style="font-family:'Fraunces';font-weight:600;font-size:24px;color:var(--ink);font-variant-numeric:lining-nums;">{{ price }} EGP</span>
      <span style="font-family:'Fraunces';font-weight:600;font-size:12px;background:var(--marigold);color:var(--olive-deep);padding:5px 11px;border-radius:var(--r-pill);">{{ saveText }}</span>
    </div>
    <button onClick="{{ add }}" style="margin-top:8px;font-family:'Fraunces';font-weight:600;font-size:15px;border:none;background:var(--olive-deep);color:var(--cream);padding:13px 16px;border-radius:var(--r-pill);cursor:pointer;transition:.16s;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;" style-hover="background:var(--marigold);color:var(--olive-deep);">{{ addLabel }}</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:440},&quot;titleText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;First Wish&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;subtitleText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Beginner's Trio&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;items&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{name:string,id:string}[]&quot;},&quot;price&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;600&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;saveText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hard to kill&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onAdd&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { added: false };
  renderVals() {
    const items = Array.isArray(this.props.items) ? this.props.items : [];
    const it = i => items[i] || {};
    return {
      titleText: this.props.titleText || 'A Wish',
      subtitleText: this.props.subtitleText || '',
      price: this.props.price || '0',
      saveText: this.props.saveText || 'Trio',
      id0: (it(0).id) || 'wish-0', id1: (it(1).id) || 'wish-1', id2: (it(2).id) || 'wish-2',
      n0: it(0).name || 'Plant', n1: it(1).name || 'Plant', n2: it(2).name || 'Plant',
      addLabel: this.state.added ? 'Wish granted ✓' : 'Grant this wish',
      add: () => {
        if (typeof this.props.onAdd === 'function') this.props.onAdd();
        this.setState({ added: true });
        clearTimeout(this._t);
        this._t = setTimeout(() => this.setState({ added: false }), 1500);
      },
    };
  }
}
</script>
</body>
</html>
